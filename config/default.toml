[core]
log_level = "${RUST_LOG:-info}"

# --- 适配器 ---
[[adapters]]
type = "qq"
enabled = true
[adapters.config]
app_id = "${QQ_APP_ID}"
client_secret = "${QQ_CLIENT_SECRET}"

# 声明 channel 与插件绑定
[[adapters.channels]]
channel_id = "qq:c2c:*"
plugins = ["builtin"]

[[adapters.channels]]
channel_id = "qq:group:*"
plugins = ["builtin"]

[[adapters.channels]]
channel_id = "qq:group:123456"
plugins = ["echo"]

# --- 插件 ---
[[plugins]]
name = "echo"
path = "./plugins/echo.wasm"
enabled = true

[[plugins]]
name = "admin"
path = "./plugins/admin.wasm"
enabled = true

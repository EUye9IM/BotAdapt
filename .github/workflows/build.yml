name: Build Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-wasm-

      - name: Build dice WASM plugin
        run: cargo build -p dice --target wasm32-wasip1 --release

      - name: Upload dice.wasm
        uses: actions/upload-artifact@v4
        with:
          name: dice-wasm
          path: target/wasm32-wasip1/release/dice.wasm

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: target-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: target-linux-

      - name: Build botadapt binary
        run: cargo build -p botadapt-cli --target x86_64-unknown-linux-musl --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: botadapt-linux
          path: target/x86_64-unknown-linux-musl/release/botadapt-cli

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: target-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: target-windows-

      - name: Build botadapt binary
        run: cargo build -p botadapt-cli --target x86_64-pc-windows-msvc --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: botadapt-windows
          path: target/x86_64-pc-windows-msvc/release/botadapt-cli.exe

  package-linux:
    needs: [build-wasm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VER=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="botadapt-cli") | .version')
          echo "version=v${VER}+build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Download dice.wasm
        uses: actions/download-artifact@v4
        with:
          name: dice-wasm

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: botadapt-linux

      - name: Assemble package
        run: |
          PKG="botadapt-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl"
          mkdir -p "$PKG/plugins"
          chmod +x botadapt-cli
          cp botadapt-cli "$PKG/botadapt"
          cp botadapt.toml "$PKG/"
          cp dice.wasm "$PKG/plugins/"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: botadapt-x86_64-unknown-linux-musl
          path: botadapt-*.tar.gz

  package-windows:
    needs: [build-wasm, build-windows]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          $ver = (cargo metadata --format-version 1 --no-deps | ConvertFrom-Json).packages | Where-Object { $_.name -eq "botadapt-cli" } | ForEach-Object { $_.version }
          echo "version=v${ver}+build.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

      - name: Download dice.wasm
        uses: actions/download-artifact@v4
        with:
          name: dice-wasm

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: botadapt-windows

      - name: Assemble package
        shell: bash
        run: |
          PKG="botadapt-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc"
          mkdir -p "$PKG/plugins"
          cp botadapt-cli.exe "$PKG/botadapt.exe"
          cp botadapt.toml "$PKG/"
          cp dice.wasm "$PKG/plugins/"
          7z a -tzip "$PKG.zip" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: botadapt-x86_64-pc-windows-msvc
          path: botadapt-*.zip

  release:
    needs: [package-linux, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VER=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="botadapt-cli") | .version')
          echo "tag=v${VER}-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: botadapt-x86_64-unknown-linux-musl

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: botadapt-x86_64-pc-windows-msvc

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            *.tar.gz
            *.zip
          draft: false
          prerelease: false

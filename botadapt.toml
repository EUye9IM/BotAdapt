[core]
log_level = "${RUST_LOG:-info}"

# --- 适配器 ---
[[adapters]]
type = "qq"
enabled = true
name = "default"
[adapters.config]
app_id = "${QQ_APP_ID}"
client_secret = "${QQ_CLIENT_SECRET}"

# 声明 channel 与插件绑定（channel_id 不需要平台前缀，已由所属 adapter 确定平台）
[[adapters.channels]]
channel_id = "c2c:*"
plugins = ["builtin", "dice"]

[[adapters.channels]]
channel_id = "group:*"
plugins = ["builtin", "dice"]

[[adapters.channels]]
channel_id = "group:123456"
plugins = ["echo", "dice"]

# --- 插件 ---
[[plugins]]
name = "dice"
path = "./plugins/dice.wasm"
enabled = true

[[plugins]]
name = "echo"
path = "./plugins/echo.wasm"
enabled = false

[[plugins]]
name = "admin"
path = "./plugins/admin.wasm"
enabled = false
